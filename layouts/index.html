{{ define "main" }}

{{ partial "intro.html" . }}

<h2 style="margin-bottom: 1rem">Posts</h2>

{{ range (where .Site.RegularPages "Section" "blog") }}
<ul>
  <li>
    {{ if .Params.date }}
    <span>{{ .Date.Format "January 2, 2006" }}</span><br>
    {{ end }}
    <a href="{{ .Permalink }}">{{ .Title }}</a>
  </li>
</ul>
{{ end }}

{{ end }}
