theme = "main"

basepageRef = "https://nakibrayan2.pages.dev"

enableRobotsTXT = true

defaultContentLanguage = "ar"
defaultContentLanguageInSubdir = true

[languages]
  [languages.ar]
    contentDir = "content/ar"
    disabled = false
    languageCode = "ar-AR"
    languageDirection = "rtl"
    languageName = "العربية"
    copyright = "© ٢٠٢٣-٢٠٢٤ ريان نقيب ، جميع الحقوق محفوظة"
    title = "ريان نقيب"
    weight = 1

    [languages.ar.params]
      siteDescription = "أنا نقيب ريان وهذا موقعو ومدونتي. يوجد الكثير هنا، اذا شكرا لزيارتك!"
      introTitle = "الترجمان ريان نقيب"
      introSubtitle = "مطور برمجيات مفتوحة المصدر"

    [[languages.ar.menu.main]]
        name = "تبرّع"
        pageRef = "donate"
        weight = 1

    [[languages.ar.menu.main]]
        name = "اتصل"
        pageRef = "contact"
        weight = 2

    [[languages.ar.menu.main]]
        name = "مشاريعي"
        pageRef = "projects"
        weight = 3

    [[languages.ar.menu.main]]
        name = "الوسوم"
        pageRef = "tags"
        weight = 4

  [languages.en]
    contentDir = "content/en"
    disabled = false
    languageCode = "en-US"
    languageDirection = "ltr"
    languageName = "English"
    copyright= "© 2023-2024 Rayan Nakib, All Rights Reserved"
    title = "Rayan Nakib"
    weight = 2

    [languages.en.params]
      siteDescription = "I am Rayan Nakib and this is my website and blog. There’s a lot here, so thanks for stopping by!"
      introTitle = "Rayan Nakib's Blog"
      introSubtitle = "A developer who works on open source"

    [[languages.en.menu.main]]
        name = "Donate"
        pageRef = "donate"
        weight = 1

    [[languages.en.menu.main]]
        name = "Contact"
        pageRef = "contact"
        weight = 2

    [[languages.en.menu.main]]
        name = "Projects"
        pageRef = "projects"
        weight = 3

    [[languages.en.menu.main]]
        name = "Tags"
